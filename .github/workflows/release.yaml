name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
      
      - name: Create ZIP with correct folder structure
        run: |
          mkdir -p lovelace-mushroomic-upstream
          cp -r dist lovelace-mushroomic-upstream/dist
          cp -r icons lovelace-mushroomic-upstream/icons
          zip -r lovelace-mushroomic-upstream.zip lovelace-mushroomic-upstream

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          generate_release_notes: true
          files: lovelace-mushroomic-upstream.zip
